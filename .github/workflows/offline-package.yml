name: Build offline package

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/offline-package.yml'
      - 'dependencies/**'
      - 'docs/OFFLINE_INSTALL.md'
      - 'offline/**'
      - 'tools/New-OfflinePackage.ps1'
      - 'MSSQL/**'
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build self-contained package
        shell: powershell
        run: .\tools\New-OfflinePackage.ps1

      - name: Validate package contents
        shell: powershell
        run: |
          $zip = Get-ChildItem .\dist\db-health-checks-offline-*.zip | Select-Object -First 1
          if (-not $zip) { throw 'Offline package was not created.' }
          $testRoot = Join-Path $env:RUNNER_TEMP 'offline-package-test'
          Expand-Archive -LiteralPath $zip.FullName -DestinationPath $testRoot -Force
          $manifest = Get-ChildItem $testRoot -Filter SqlServer.psd1 -Recurse | Select-Object -First 1
          $installer = Join-Path $testRoot 'Install-OfflineDependencies.ps1'
          if (-not $manifest) { throw 'SqlServer.psd1 is missing from the package.' }
          if (-not (Test-Path $installer)) { throw 'Offline installer is missing from the package.' }
          Import-Module $manifest.FullName -Force -ErrorAction Stop
          Get-Command Invoke-Sqlcmd -ErrorAction Stop | Out-Null

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-health-checks-offline
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download validated package
        uses: actions/download-artifact@v4
        with:
          name: db-health-checks-offline
          path: dist

      - name: Attach package to GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view '${{ github.ref_name }}' 2>$null
          if ($LASTEXITCODE -ne 0) {
              gh release create '${{ github.ref_name }}' --title '${{ github.ref_name }}' --generate-notes
          }
          gh release upload '${{ github.ref_name }}' .\dist\*.zip .\dist\*.sha256 --clobber
